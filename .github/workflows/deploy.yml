name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Create Terraform state bucket
        run: |
          aws s3api create-bucket \
            --bucket aws-fullstack-app-tfstate-863430823865 \
            --region us-east-1 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket aws-fullstack-app-tfstate-863430823865 \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      - name: Cleanup existing resources
        run: |
          REGION="us-east-1"
          PROJECT="aws-fullstack-app"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # IAM Role
          aws iam detach-role-policy --role-name ${PROJECT}-ecs-execution-role --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          aws iam delete-role-policy --role-name ${PROJECT}-ecs-execution-role --policy-name ${PROJECT}-ecs-secrets-policy 2>/dev/null || true
          aws iam delete-role --role-name ${PROJECT}-ecs-execution-role 2>/dev/null || true

          # CloudWatch Log Group
          aws logs delete-log-group --log-group-name /ecs/${PROJECT} --region $REGION 2>/dev/null || true

          # ECS Service and Cluster
          aws ecs update-service --cluster ${PROJECT}-cluster --service ${PROJECT}-service --desired-count 0 --region $REGION 2>/dev/null || true
          aws ecs delete-service --cluster ${PROJECT}-cluster --service ${PROJECT}-service --force --region $REGION 2>/dev/null || true
          aws ecs delete-cluster --cluster ${PROJECT}-cluster --region $REGION 2>/dev/null || true

          # ALB Listener, Target Group and ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names ${PROJECT}-alb --query 'LoadBalancers[0].LoadBalancerArn' --output text --region $REGION 2>/dev/null)
          if [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ]; then
            LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn $ALB_ARN --query 'Listeners[0].ListenerArn' --output text --region $REGION 2>/dev/null)
            [ -n "$LISTENER_ARN" ] && aws elbv2 delete-listener --listener-arn $LISTENER_ARN --region $REGION 2>/dev/null || true
            aws elbv2 delete-load-balancer --load-balancer-arn $ALB_ARN --region $REGION 2>/dev/null || true
            sleep 15
          fi
          TG_ARN=$(aws elbv2 describe-target-groups --names ${PROJECT}-tg --query 'TargetGroups[0].TargetGroupArn' --output text --region $REGION 2>/dev/null)
          [ "$TG_ARN" != "None" ] && [ -n "$TG_ARN" ] && aws elbv2 delete-target-group --target-group-arn $TG_ARN --region $REGION 2>/dev/null || true

          # S3 Frontend Bucket
          aws s3 rb s3://${PROJECT}-frontend-${ACCOUNT_ID} --force 2>/dev/null || true

          # ECR
          aws ecr delete-repository --repository-name ${PROJECT}-backend --force --region $REGION 2>/dev/null || true

          # Secrets Manager
          aws secretsmanager delete-secret --secret-id ${PROJECT}/db-password --force-delete-without-recovery --region $REGION 2>/dev/null || true

          # RDS Instance (async - starts deletion)
          aws rds delete-db-instance --db-instance-identifier ${PROJECT}-db --skip-final-snapshot --region $REGION 2>/dev/null || true

          # Esperar a que RDS termine de borrarse
          echo "Esperando a que RDS se elimine..."
          aws rds wait db-instance-deleted --db-instance-identifier ${PROJECT}-db --region $REGION 2>/dev/null || true

          # RDS Subnet Group (solo se puede borrar cuando RDS ya no existe)
          aws rds delete-db-subnet-group --db-subnet-group-name ${PROJECT}-db-subnet-group --region $REGION 2>/dev/null || true

          # VPC and dependencies
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=${PROJECT}-vpc" --query 'Vpcs[0].VpcId' --output text --region $REGION 2>/dev/null)
          if [ "$VPC_ID" != "None" ] && [ -n "$VPC_ID" ]; then
            for SID in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[*].SubnetId' --output text --region $REGION); do
              aws ec2 delete-subnet --subnet-id $SID --region $REGION 2>/dev/null || true
            done
            for SGID in $(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[?GroupName!='default'].GroupId" --output text --region $REGION); do
              aws ec2 delete-security-group --group-id $SGID --region $REGION 2>/dev/null || true
            done
            IGW_ID=$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$VPC_ID" --query 'InternetGateways[0].InternetGatewayId' --output text --region $REGION 2>/dev/null)
            if [ "$IGW_ID" != "None" ] && [ -n "$IGW_ID" ]; then
              aws ec2 detach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID --region $REGION 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id $IGW_ID --region $REGION 2>/dev/null || true
            fi
            for RTID in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --query "RouteTables[?length(Associations[?Main==\`true\`])==\`0\`].RouteTableId" --output text --region $REGION); do
              aws ec2 delete-route-table --route-table-id $RTID --region $REGION 2>/dev/null || true
            done
            aws ec2 delete-vpc --vpc-id $VPC_ID --region $REGION 2>/dev/null || true
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Get Terraform outputs
        working-directory: terraform
        id: tf
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ steps.tf.outputs.ecr_url }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.tf.outputs.ecr_url }}:latest ./backend
          docker push ${{ steps.tf.outputs.ecr_url }}:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf.outputs.cluster }} \
            --service ${{ steps.tf.outputs.service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Upload frontend to S3
        run: |
          aws s3 cp frontend/index.html s3://${{ steps.tf.outputs.s3_bucket }}/index.html

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cloudfront_id }} \
            --paths "/*"
