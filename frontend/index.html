<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorials App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── VARIABLES ── */
  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --border:   #252a38;
    --accent:   #4f8ef7;
    --accent2:  #f7914f;
    --danger:   #f75f5f;
    --success:  #4fca8e;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --radius:   10px;
    --mono:     'DM Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── LAYOUT ── */
  .app { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot.error     { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 20px; align-items: start; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* ── FORM ── */
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-family: var(--mono); }
  input[type="text"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 80px; }

  .btn {
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 8px; }
  .btn-danger:hover { background: rgba(247,95,95,.08); }

  /* ── LIST ── */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input {
    padding-left: 34px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    width: 100%; padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* ── TUTORIAL ITEM ── */
  .tutorial-list { display: flex; flex-direction: column; gap: 8px; }
  .tutorial-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 14px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  .tutorial-item:hover { border-color: var(--accent); background: rgba(79,142,247,.04); }
  .tutorial-item.active { border-color: var(--accent); background: rgba(79,142,247,.07); }

  .item-status {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 6px; flex-shrink: 0;
  }
  .item-status.published { background: var(--success); }
  .item-status.draft     { background: var(--muted); }

  .item-body { flex: 1; min-width: 0; }
  .item-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-desc {
    font-size: 12px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-badge {
    font-size: 10px; font-family: var(--mono);
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-top: 2px;
  }
  .item-badge.published { background: rgba(79,202,142,.12); color: var(--success); }
  .item-badge.draft     { background: rgba(107,114,128,.12); color: var(--muted); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    display: none;
  }
  .detail-panel.visible { display: block; animation: fadeIn .2s ease; }
  .detail-id {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    margin-bottom: 12px;
  }
  .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .detail-desc  { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.7; }
  .detail-actions { display: flex; gap: 8px; }
  .btn-sm {
    padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: opacity .15s;
    font-family: var(--sans);
  }
  .btn-sm:hover { opacity: .82; }
  .btn-publish { background: var(--success); color: #0f1117; }
  .btn-unpublish { background: rgba(79,202,142,.12); color: var(--success); border: 1px solid var(--success) !important; }
  .btn-delete-sm { background: rgba(247,95,95,.12); color: var(--danger); border: 1px solid var(--danger) !important; }

  /* ── EMPTY / LOADING ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 10px; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 30px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-family: var(--mono);
    opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok   { border-color: var(--success); color: var(--success); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }

  /* ── CONFIG BAR ── */
  .config-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .config-bar label { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .config-bar input {
    flex: 1;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 12px;
    padding: 6px 10px; outline: none;
    transition: border-color .2s;
  }
  .config-bar input:focus { border-color: var(--accent); }
  .btn-connect {
    padding: 6px 14px; border-radius: 6px; border: none;
    background: var(--accent); color: white;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: var(--mono); white-space: nowrap;
    transition: opacity .15s;
  }
  .btn-connect:hover { opacity: .85; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">📚</div>
    <div>
      <h1>tutorials.app</h1>
      <p>Full-stack on AWS · ECS Fargate + RDS + S3 + CloudFront</p>
    </div>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">disconnected</span>
    </div>
  </header>

  <!-- API CONFIG BAR -->
  <div class="config-bar">
    <label>API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8080" placeholder="https://your-fargate-url"/>
    <button class="btn-connect" onclick="connectApi()">Connect</button>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT: CREATE FORM -->
    <div>
      <div class="card">
        <div class="card-title">New Tutorial</div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="newTitle" placeholder="e.g. Intro to Docker"/>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="newDesc" placeholder="What is this tutorial about?"></textarea>
        </div>
        <button class="btn btn-primary" onclick="createTutorial()">+ Create Tutorial</button>
      </div>

      <!-- DETAIL PANEL (shows on click) -->
      <div class="detail-panel" id="detailPanel">
        <div class="detail-id" id="detailId"></div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-desc"  id="detailDesc"></div>
        <div class="detail-actions">
          <button class="btn-sm btn-publish" id="btnToggle" onclick="togglePublish()">Publish</button>
          <button class="btn-sm btn-delete-sm" onclick="deleteSelected()">Delete</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: LIST -->
    <div class="card">
      <div class="list-header">
        <div class="card-title" style="margin:0">Tutorials</div>
        <span class="count" id="countBadge">0</span>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by title..." oninput="searchTutorials()"/>
      </div>

      <div id="listContainer">
        <div class="empty"><div class="icon">📡</div>Connect to your API to load tutorials</div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ── STATE ──
  let API = 'http://localhost:8080';
  let tutorials = [];
  let selectedId = null;

  // ── API CONNECT ──
  async function connectApi() {
    API = document.getElementById('apiUrl').value.replace(/\/$/, '');
    setStatus('connecting...');
    await loadTutorials();
  }

  // ── LOAD ALL ──
  async function loadTutorials() {
    showLoading();
    try {
      const res = await fetch(`${API}/api/tutorials`);
      if (!res.ok) throw new Error();
      tutorials = await res.json();
      setStatus('connected', true);
      renderList(tutorials);
    } catch {
      setStatus('error', false, true);
      showEmpty('⚠️', 'Could not connect to API');
    }
  }

  // ── SEARCH ──
  async function searchTutorials() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return renderList(tutorials);
    try {
      const res = await fetch(`${API}/api/tutorials?title=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderList(data);
    } catch { renderList(tutorials.filter(t => t.title.toLowerCase().includes(q.toLowerCase()))); }
  }

  // ── CREATE ──
  async function createTutorial() {
    const title = document.getElementById('newTitle').value.trim();
    const description = document.getElementById('newDesc').value.trim();
    if (!title) return toast('Title is required', 'err');
    try {
      const res = await fetch(`${API}/api/tutorials`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, published: false })
      });
      if (!res.ok) throw new Error();
      document.getElementById('newTitle').value = '';
      document.getElementById('newDesc').value = '';
      toast('Tutorial created ✓', 'ok');
      await loadTutorials();
    } catch { toast('Error creating tutorial', 'err'); }
  }

  // ── SELECT ──
  function selectTutorial(t) {
    selectedId = t.id;
    document.querySelectorAll('.tutorial-item').forEach(el => el.classList.remove('active'));
    document.getElementById('item-' + t.id)?.classList.add('active');
    document.getElementById('detailId').textContent    = `id: ${t.id}`;
    document.getElementById('detailTitle').textContent = t.title;
    document.getElementById('detailDesc').textContent  = t.description || '(no description)';
    const btn = document.getElementById('btnToggle');
    if (t.published) { btn.textContent = 'Unpublish'; btn.className = 'btn-sm btn-unpublish'; }
    else             { btn.textContent = 'Publish';   btn.className = 'btn-sm btn-publish'; }
    document.getElementById('detailPanel').classList.add('visible');
  }

  // ── TOGGLE PUBLISH ──
  async function togglePublish() {
    const t = tutorials.find(x => x.id === selectedId);
    if (!t) return;
    try {
      await fetch(`${API}/api/tutorials/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...t, published: !t.published })
      });
      toast(t.published ? 'Unpublished' : 'Published ✓', 'ok');
      await loadTutorials();
      const updated = tutorials.find(x => x.id === selectedId);
      if (updated) selectTutorial(updated);
    } catch { toast('Error updating', 'err'); }
  }

  // ── DELETE ──
  async function deleteSelected() {
    if (!selectedId) return;
    try {
      await fetch(`${API}/api/tutorials/${selectedId}`, { method: 'DELETE' });
      toast('Deleted', 'ok');
      selectedId = null;
      document.getElementById('detailPanel').classList.remove('visible');
      await loadTutorials();
    } catch { toast('Error deleting', 'err'); }
  }

  // ── RENDER ──
  function renderList(list) {
    const container = document.getElementById('listContainer');
    document.getElementById('countBadge').textContent = list.length;
    if (!list.length) { showEmpty('📭', 'No tutorials yet'); return; }
    container.innerHTML = `<div class="tutorial-list">${list.map(t => `
      <div class="tutorial-item ${t.id === selectedId ? 'active' : ''}" id="item-${t.id}" onclick='selectTutorial(${JSON.stringify(t)})'>
        <div class="item-status ${t.published ? 'published' : 'draft'}"></div>
        <div class="item-body">
          <div class="item-title">${esc(t.title)}</div>
          <div class="item-desc">${esc(t.description || '—')}</div>
        </div>
        <span class="item-badge ${t.published ? 'published' : 'draft'}">${t.published ? 'published' : 'draft'}</span>
      </div>`).join('')}</div>`;
  }

  // ── HELPERS ──
  function showLoading() {
    document.getElementById('listContainer').innerHTML = '<div class="spinner"></div>';
  }
  function showEmpty(icon, msg) {
    document.getElementById('listContainer').innerHTML =
      `<div class="empty"><div class="icon">${icon}</div>${msg}</div>`;
    document.getElementById('countBadge').textContent = '0';
  }
  function setStatus(text, ok = false, err = false) {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'dot' + (ok ? ' connected' : err ? ' error' : '');
  }
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2800);
  }
</script>
</body>
</html>
